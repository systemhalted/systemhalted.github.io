# Setup
title:                SystemHalted
tagline:             'By Palak Mathur'
description:         'SystemHalted is the personal blog of Palak Mathur, covering software engineering, leadership, management, and Emacs, plus the Kartavya Path newsletter.'
url:                 https://systemhalted.in
baseurl:             ''

# Theme files are vendored directly into this repo (_layouts, _includes,
# assets/css/nord.css, assets/js). Back-ported to the jekyll-theme-nord-newsletter
# gem only when a change is worth sharing.

paginate:            8
paginate_path:       "/page:num"
permalink:           pretty

# About/contact
author:
  name:              Palak Mathur
  url:               https://systemhalted.in
  email:             insanethoughts@live.com
  linkedin:          https://www.linkedin.com/in/systemhalted/
  avatar:            /assets/images/avatar.jpeg

# Default social share image + publisher logo (picked up by jekyll-seo-tag)
logo:                /assets/images/avatar.jpeg

# Social profiles — jekyll-seo-tag emits these as schema.org `sameAs` on the
# homepage, tying "systemhalted" / "system halted" queries to this brand/person.
social:
  links:
    - https://github.com/systemhalted
    - https://www.linkedin.com/in/systemhalted/
    - https://palakmathur.substack.com


markdown: kramdown
highlighter: rouge
kramdown:
  math_engine: katex
  syntax_highlighter: rouge
# Gems
plugins:
  - jekyll-paginate
  - jekyll-gist
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-toc

# https://github.com/mojombo/jekyll/wiki/Permalinks
permalink:   /:year/:month/:day/:title/

# Custom vars
version:             1.1.0
google_analytics_id: UA-36868278-1

google_site_verification: 1v5ZSlWxFB06EQ-VB5U4n3226XFqq3ki9qusVH2m0K8

feed:
  posts_limit: 50
  collections:
    newsletter:
      path: "/feed/newsletter.xml"
      title: "Kartavya Path"

# Org-mode sources (exported to collections/_posts by org/ox-jekyll.el);
# never publish them as static files.
exclude:
  - org/

collections_dir: collections

collections:
  jsgames:
    output: false
  emacs: 
    output: true 
  newsletter:
    output: true


sidebar:
  items:
    - title: "Home"
      url: "/"
    - title: "About"
      url: "/about/"
    - title: "Kartavya Path - Newsletter"
      url: "/kartavya-path"
    - title: "Featured Posts"
      url: "/featured/"
    - title: "Archives"
      url: "/archives/"
    - title: "Categories"
      url: "/categories/"
    - title: "Emacs"
      url: "/emacs/"
    - title: "Javascript Games"
      url: "/jsgames/"
    - title: "Jekyll Themes"
      url: "/themes/"
    - title: In the beginning...
      url: /webcmd/

    # add / remove / reorder as you like

# Theme (nord-newsletter) content config
newsletter_cta:
  title:       "Kartavya Path"
  lede:        "A note on leadership, management, and the long road. Free, occasional, no spam."
  path:        /kartavya-path/
  feed_path:   /feed/newsletter.xml
  footer_blurb: "Get Kartavya Path — short essays on leadership and management — by email, or follow the blog by RSS."
  kit_uid:     b1d6fc350a
  kit_url:     https://kartavya-path-by-palak-mathur.kit.com

giscus:
  repo:        systemhalted/systemhalted.github.io
  repo_id:     MDEwOlJlcG9zaXRvcnk0NjcwNjAxOA==
  category:    Comments
  category_id: DIC_kwDOAsitYs4C9Yut
  mapping:     pathname

search:
  suggestions:
    - emacs
    - leadership
    - newsletter
    - javascript
