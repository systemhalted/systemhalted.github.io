<head>
  <link href="http://gmpg.org/xfn/11" rel="profile">
  <meta http-equiv="content-type" content="text/html; charset=utf-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  
   <!-- Basic meta elements -->
  <meta charset="utf-8" />
  
  <!-- Enable responsiveness on mobile devices -->
  <meta name="viewport" content="width=device-width,initial-scale=1.0,shrink-to-fit=no" />

  {% comment %} Canonical is emitted by jekyll-seo-tag ({% seo %} below). {% endcomment %}

  {% if page.robots == "noindex" or paginator.page > 1 %}
  <meta name="robots" content="noindex,follow">
  {% endif %}

  <script>
    (function() {
      var storageKey = 'theme';
      var lightClass = 'theme-nord-light';
      var darkClass = 'theme-nord-dark';
      var root = document.documentElement;
      var saved = null;

      function normalizeTheme(value) {
        return value === 'dark' || value === 'light' ? value : null;
      }

      try {
        saved = normalizeTheme(localStorage.getItem(storageKey));
      } catch (e) {
        saved = null;
      }

      if (!saved) {
        try {
          if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            saved = 'dark';
          } else {
            saved = 'light';
          }
        } catch (e) {
          saved = 'light';
        }
      }

      root.classList.remove(lightClass, darkClass);
      root.classList.add(saved === 'dark' ? darkClass : lightClass);

      try {
        if (localStorage.getItem('theme-style') === 'glazed') {
          root.classList.add('theme-glazed');
        }
      } catch (e) {}

      try {
        if (localStorage.getItem('theme-crt') === 'on') {
          root.classList.add('theme-crt');
        }
      } catch (e) {}
    })();
  </script>

  <link rel="stylesheet" href="{{ '/assets/css/nord.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css" integrity="sha384-wcIxkf4k558AjM3Yz3BBFQUbk/zgIYC2R0QpeeYb+TwlBVMrlgLqwRjRtGZiK7ww" crossorigin="anonymous">
  
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=Source+Code+Pro:wght@400;500;600&family=UnifrakturMaguntia&display=swap">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

  <link rel="apple-touch-icon-precomposed" sizes="144x144" href="{{ '/assets/apple-touch-icon-precomposed.png' | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}">
  <link rel="shortcut icon" href="{{ '/assets/favicon.ico' | relative_url }}">

  <link rel="alternate" type="application/rss+xml" href="{{ '/feed.xml' | relative_url }}">

  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js" integrity="sha384-hIoBPJpTUs74ddyc4bFZSM1TVlQDA60VBbJS0oA934VSz82sBx1X7kSx2ATBDIyd" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js" integrity="sha384-43gviWU0YVjaDtb/GhzOouOXtZMP/7XUzwPTstBeZFe/+rCMvRwr4yROQP43s0Xk" crossorigin="anonymous"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (typeof renderMathInElement !== 'function') {
        return;
      }
      renderMathInElement(document.body, {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '$', right: '$', display: false },
          { left: '\\(', right: '\\)', display: false },
          { left: '\\[', right: '\\]', display: true }
        ],
        throwOnError: false
      });
    });
  </script>

  {% if site.google_analytics_id %}
 <!-- Global site tag (gtag.js) - Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics_id }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', '{{ site.google_analytics_id }}');
</script>
  {% endif %}

  {% seo %}
  {% include structured-data.html %}
</head>
