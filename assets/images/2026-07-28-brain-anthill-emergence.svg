<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <marker id="up" markerWidth="10" markerHeight="10" refX="3" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M3,0 L6,7 L0,7 Z" fill="#B48EAD"/>
    </marker>
  </defs>

  <rect x="10" y="10" width="760" height="320" rx="14" fill="#ECEFF4" stroke="#D8DEE9"/>
  <text x="390" y="40" text-anchor="middle" font-size="19" font-weight="700" fill="#3B4252">Behavior emerges at the level of the system</text>
  <text x="390" y="59" text-anchor="middle" font-size="12" fill="#4C566A">read each column bottom to top: many simple parts, interacting, produce one system-level property</text>

  <!-- column headers -->
  <text x="210" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#5E81AC">Brain</text>
  <text x="570" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#A3BE8C">Anthill</text>

  <!-- ===== Brain column ===== -->
  <!-- top: emergent property -->
  <rect x="70" y="100" width="280" height="40" rx="8" fill="#E5E9F0" stroke="#5E81AC" stroke-width="1.5"/>
  <text x="210" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="#2E3440">Cognition</text>
  <!-- middle: interaction -->
  <rect x="70" y="176" width="280" height="40" rx="8" fill="#FFFFFF" stroke="#D8DEE9"/>
  <text x="210" y="201" text-anchor="middle" font-size="12.5" fill="#2E3440">neurons fire and signal each other</text>
  <!-- bottom: many units -->
  <rect x="70" y="252" width="280" height="52" rx="8" fill="#FFFFFF" stroke="#D8DEE9"/>
  <text x="210" y="271" text-anchor="middle" font-size="12.5" fill="#2E3440">~86 billion neurons</text>
  <g fill="#88C0D0" stroke="#4C566A" stroke-width="0.5">
    <circle cx="120" cy="288" r="5"/><circle cx="145" cy="290" r="5"/><circle cx="170" cy="287" r="5"/><circle cx="195" cy="291" r="5"/><circle cx="220" cy="287" r="5"/><circle cx="245" cy="290" r="5"/><circle cx="270" cy="288" r="5"/><circle cx="295" cy="290" r="5"/>
  </g>
  <!-- upward arrows -->
  <line x1="210" y1="252" x2="210" y2="222" stroke="#B48EAD" stroke-width="1.5" marker-end="url(#up)"/>
  <line x1="210" y1="176" x2="210" y2="146" stroke="#B48EAD" stroke-width="1.5" marker-end="url(#up)"/>
  <text x="358" y="240" font-size="10.5" font-style="italic" fill="#4C566A" text-anchor="middle" transform="rotate(-90 358 240)">emerges</text>

  <!-- ===== Anthill column ===== -->
  <rect x="430" y="100" width="280" height="40" rx="8" fill="#E5E9F0" stroke="#A3BE8C" stroke-width="1.5"/>
  <text x="570" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="#2E3440">Colony behavior</text>
  <rect x="430" y="176" width="280" height="40" rx="8" fill="#FFFFFF" stroke="#D8DEE9"/>
  <text x="570" y="201" text-anchor="middle" font-size="12.5" fill="#2E3440">ants exchange local signals</text>
  <rect x="430" y="252" width="280" height="52" rx="8" fill="#FFFFFF" stroke="#D8DEE9"/>
  <text x="570" y="271" text-anchor="middle" font-size="12.5" fill="#2E3440">thousands of ants</text>
  <g fill="#A3BE8C" stroke="#4C566A" stroke-width="0.5">
    <circle cx="480" cy="288" r="5"/><circle cx="505" cy="290" r="5"/><circle cx="530" cy="287" r="5"/><circle cx="555" cy="291" r="5"/><circle cx="580" cy="287" r="5"/><circle cx="605" cy="290" r="5"/><circle cx="630" cy="288" r="5"/><circle cx="655" cy="290" r="5"/>
  </g>
  <line x1="570" y1="252" x2="570" y2="222" stroke="#B48EAD" stroke-width="1.5" marker-end="url(#up)"/>
  <line x1="570" y1="176" x2="570" y2="146" stroke="#B48EAD" stroke-width="1.5" marker-end="url(#up)"/>
  <text x="718" y="240" font-size="10.5" font-style="italic" fill="#4C566A" text-anchor="middle" transform="rotate(-90 718 240)">emerges</text>
</svg>
